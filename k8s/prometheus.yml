global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PowerVerse API metrics (if exposed)
  - job_name: 'powerverse-api'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: '/metrics'

  # DCGM Exporter on GPU servers
  - job_name: 'dcgm-exporter'
    static_configs:
      - targets: ['${DCGM_EXPORTER_TARGET:-localhost:9400}']
        labels:
          server: '${SERVER_NAME:-gpu-server-1}'
          subsidiary: '${SUBSIDIARY:-子公司A}'
          machine_room: '${MACHINE_ROOM:-机房1}'
